pool: Default
steps:
  - task: AzureCLI@2
    displayName: Get AKS credentials and deploy
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        az aks get-credentials \
          --resource-group "$(resourceGroup)" \
          --name "$(aksName)" \
          --file "$(kubeconfigPath)" \
          --overwrite-existing
        kubelogin convert-kubeconfig \
          -l azurecli \
          --kubeconfig "$(kubeconfigPath)"
        kubectl --kubeconfig "$(kubeconfigPath)" apply \
          -n "$(namespace)" \
          -f "openshift/deployment.yaml"
        kubectl --kubeconfig "$(kubeconfigPath)" apply \
          -n "$(namespace)" \
          -f "openshift/service.yaml"
